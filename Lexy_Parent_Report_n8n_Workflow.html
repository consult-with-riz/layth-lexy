<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Parent Report Generator — n8n Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0e0e1a; height: 100%; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }
  svg { width: 100vw; height: 100vh; display: block; }
  @keyframes title-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .title-g { animation: title-in 1s ease-out forwards; opacity: 0; transform-origin: center; }
  @keyframes status-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .status-g { animation: status-in 0.8s ease-out 3.5s forwards; opacity: 0; }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  .pulse-dot { animation: pulse-dot 1.8s ease-in-out infinite; }
</style>
</head>
<body>
<svg viewBox="0 0 900 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Dot grid -->
    <pattern id="grid-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1" fill="rgba(255,255,255,0.055)"/>
    </pattern>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Connector paths -->
    <!-- Row 1: left to right at y=190 -->
    <path id="c01" d="M 132,190 L 261,190"/>
    <path id="c12" d="M 385,190 L 514,190"/>
    <path id="c23" d="M 638,190 L 767,190"/>
    <!-- Bend: N3 (829,190) down to N4 (829,410) -->
    <path id="c34" d="M 829,252 C 829,300 829,300 829,348"/>
    <!-- Row 2: right to left at y=410 -->
    <path id="c45" d="M 767,410 L 638,410"/>
    <path id="c56" d="M 514,410 L 385,410"/>
  </defs>

  <!-- Background layers -->
  <rect width="900" height="600" fill="#1a1a2e"/>
  <rect width="900" height="600" fill="url(#grid-dots)"/>
  <rect width="900" height="600" fill="url(#vignette)"/>

  <!-- Title -->
  <g class="title-g">
    <text x="450" y="44" text-anchor="middle"
      font-family="'Space Grotesk',sans-serif" font-size="19" font-weight="700"
      fill="#F5EFE0" letter-spacing="1">PARENT REPORT GENERATOR</text>
    <text x="450" y="64" text-anchor="middle"
      font-family="'DM Sans',sans-serif" font-size="10.5"
      fill="rgba(245,239,224,0.38)" letter-spacing="3">SCREENER · CLAUDE · PDF — AUTOMATICALLY</text>
  </g>

  <!-- Row direction labels -->
  <text x="450" y="108" text-anchor="middle"
    font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="600"
    fill="rgba(245,239,224,0.45)" letter-spacing="2.5">INGESTION  ──►</text>
  <text x="450" y="498" text-anchor="middle"
    font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="600"
    fill="rgba(245,239,224,0.45)" letter-spacing="2.5">◄──  DELIVERY</text>

  <!-- Connectors: static dim lines -->
  <use href="#c01" stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none"/>
  <use href="#c12" stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none"/>
  <use href="#c23" stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none"/>
  <use href="#c34" stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none"/>
  <use href="#c45" stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none"/>
  <use href="#c56" stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none"/>

  <!-- Connectors: glow pulses -->
  <use href="#c01" stroke="#EA6A47" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" begin="0s" repeatCount="indefinite"/>
  </use>
  <use href="#c12" stroke="#2db8b0" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </use>
  <use href="#c23" stroke="#e8a838" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" begin="2s" repeatCount="indefinite"/>
  </use>
  <use href="#c34" stroke="#e8a838" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" begin="3s" repeatCount="indefinite"/>
  </use>
  <use href="#c45" stroke="#2da47e" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" begin="4s" repeatCount="indefinite"/>
  </use>
  <use href="#c56" stroke="#4a90d9" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" begin="5s" repeatCount="indefinite"/>
  </use>

  <!-- Travelling balls -->
  <!-- c01 -->
  <circle r="6" fill="#EA6A47" filter="url(#glow-soft)">
    <animateMotion dur="0.7s" begin="0s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c01"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#fff">
    <animateMotion dur="0.7s" begin="0.05s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c01"/>
    </animateMotion>
  </circle>
  <!-- c12 -->
  <circle r="6" fill="#2db8b0" filter="url(#glow-soft)">
    <animateMotion dur="0.7s" begin="1s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c12"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#fff">
    <animateMotion dur="0.7s" begin="1.05s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c12"/>
    </animateMotion>
  </circle>
  <!-- c23 -->
  <circle r="6" fill="#e8a838" filter="url(#glow-soft)">
    <animateMotion dur="0.7s" begin="2s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c23"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#fff">
    <animateMotion dur="0.7s" begin="2.05s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c23"/>
    </animateMotion>
  </circle>
  <!-- c34 (bend) -->
  <circle r="6" fill="#e8a838" filter="url(#glow-soft)">
    <animateMotion dur="0.85s" begin="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c34"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#fff">
    <animateMotion dur="0.85s" begin="3.05s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c34"/>
    </animateMotion>
  </circle>
  <!-- c45 -->
  <circle r="6" fill="#2da47e" filter="url(#glow-soft)">
    <animateMotion dur="0.7s" begin="4s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c45"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#fff">
    <animateMotion dur="0.7s" begin="4.05s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c45"/>
    </animateMotion>
  </circle>
  <!-- c56 -->
  <circle r="6" fill="#4a90d9" filter="url(#glow-soft)">
    <animateMotion dur="0.7s" begin="5s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c56"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#fff">
    <animateMotion dur="0.7s" begin="5.05s" repeatCount="indefinite" rotate="auto">
      <mpath href="#c56"/>
    </animateMotion>
  </circle>

  <!-- Bend pill label -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3s" fill="freeze"/>
    <rect x="855" y="291" width="60" height="18" rx="9"
      fill="rgba(232,168,56,0.18)" stroke="rgba(232,168,56,0.45)" stroke-width="1"/>
    <text x="885" y="304" text-anchor="middle"
      font-family="'Space Grotesk',sans-serif" font-size="9" font-weight="700"
      fill="#e8a838" letter-spacing="1">RENDER</text>
  </g>

  <!-- ────────────────────────────────────────────────────────────────────
       NODE CARDS
       ──────────────────────────────────────────────────────────────────── -->

  <!-- N0: Screener Done (trigger, coral) — cx=70, cy=190 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0s" fill="freeze"/>
    <rect x="8" y="128" width="124" height="124" rx="12" fill="none" filter="url(#shadow)"/>
    <rect x="8" y="128" width="124" height="124" rx="12" fill="#252542" stroke="rgba(234,106,71,0.55)" stroke-width="1.5"/>
    <rect x="8" y="128" width="124" height="4" rx="2" fill="#EA6A47"/>
    <circle cx="70" cy="172" r="18" fill="rgba(234,106,71,0.15)"/>
    <!-- icon: webhook arrow -->
    <path d="M60,166 L80,166 L75,160 M80,166 L75,172" stroke="#EA6A47" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="63" cy="178" r="3" fill="#EA6A47"/>
    <text x="70" y="220" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="600" fill="#F5EFE0">Screener Done</text>
    <!-- Trigger pulse rings -->
    <circle cx="70" cy="172" fill="none" stroke="#EA6A47" stroke-width="1.4">
      <animate attributeName="r" values="18;56" dur="1.4s" begin="0.6s" repeatCount="indefinite" calcMode="ease-out"/>
      <animate attributeName="stroke-opacity" values="0.7;0" dur="1.4s" begin="0.6s" repeatCount="indefinite" calcMode="ease-out"/>
    </circle>
    <circle cx="70" cy="172" fill="none" stroke="#EA6A47" stroke-width="1">
      <animate attributeName="r" values="18;56" dur="1.4s" begin="1.1s" repeatCount="indefinite" calcMode="ease-out"/>
      <animate attributeName="stroke-opacity" values="0.4;0" dur="1.4s" begin="1.1s" repeatCount="indefinite" calcMode="ease-out"/>
    </circle>
  </g>

  <!-- N1: Fetch Data (teal) — cx=323, cy=190 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.5s" fill="freeze"/>
    <rect x="261" y="128" width="124" height="124" rx="12" fill="none" filter="url(#shadow)"/>
    <rect x="261" y="128" width="124" height="124" rx="12" fill="#252542" stroke="rgba(45,184,176,0.55)" stroke-width="1.5"/>
    <rect x="261" y="128" width="124" height="4" rx="2" fill="#2db8b0"/>
    <circle cx="323" cy="172" r="18" fill="rgba(45,184,176,0.15)"/>
    <!-- icon: database cylinder -->
    <ellipse cx="323" cy="165" rx="8" ry="3" fill="none" stroke="#2db8b0" stroke-width="1.6"/>
    <path d="M315,165 L315,180 C315,182 319,184 323,184 C327,184 331,182 331,180 L331,165" stroke="#2db8b0" stroke-width="1.6" fill="none"/>
    <line x1="315" y1="172" x2="331" y2="172" stroke="#2db8b0" stroke-width="1.2" opacity="0.6"/>
    <text x="323" y="220" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="600" fill="#F5EFE0">Fetch Data</text>
  </g>

  <!-- N2: Claude Report (amber) — cx=576, cy=190 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="1s" fill="freeze"/>
    <rect x="514" y="128" width="124" height="124" rx="12" fill="none" filter="url(#shadow)"/>
    <rect x="514" y="128" width="124" height="124" rx="12" fill="#252542" stroke="rgba(232,168,56,0.55)" stroke-width="1.5"/>
    <rect x="514" y="128" width="124" height="4" rx="2" fill="#e8a838"/>
    <circle cx="576" cy="172" r="18" fill="rgba(232,168,56,0.15)"/>
    <!-- icon: AI sparkle -->
    <path d="M576,162 L578,170 L586,172 L578,174 L576,182 L574,174 L566,172 L574,170 Z" fill="#e8a838"/>
    <circle cx="585" cy="164" r="1.5" fill="#e8a838"/>
    <circle cx="568" cy="180" r="1.5" fill="#e8a838"/>
    <text x="576" y="220" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="600" fill="#F5EFE0">Claude Report</text>
  </g>

  <!-- N3: Render PDF (amber) — cx=829, cy=190 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="1.5s" fill="freeze"/>
    <rect x="767" y="128" width="124" height="124" rx="12" fill="none" filter="url(#shadow)"/>
    <rect x="767" y="128" width="124" height="124" rx="12" fill="#252542" stroke="rgba(232,168,56,0.55)" stroke-width="1.5"/>
    <rect x="767" y="128" width="124" height="4" rx="2" fill="#e8a838"/>
    <circle cx="829" cy="172" r="18" fill="rgba(232,168,56,0.15)"/>
    <!-- icon: document -->
    <rect x="822" y="162" width="14" height="18" rx="1.5" fill="none" stroke="#e8a838" stroke-width="1.6"/>
    <line x1="824" y1="168" x2="834" y2="168" stroke="#e8a838" stroke-width="1.2"/>
    <line x1="824" y1="172" x2="834" y2="172" stroke="#e8a838" stroke-width="1.2"/>
    <line x1="824" y1="176" x2="831" y2="176" stroke="#e8a838" stroke-width="1.2"/>
    <text x="829" y="220" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="600" fill="#F5EFE0">Render PDF</text>
  </g>

  <!-- N4: Save PDF (mid-green) — cx=829, cy=410 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="2s" fill="freeze"/>
    <rect x="767" y="348" width="124" height="124" rx="12" fill="none" filter="url(#shadow)"/>
    <rect x="767" y="348" width="124" height="124" rx="12" fill="#252542" stroke="rgba(45,164,126,0.55)" stroke-width="1.5"/>
    <rect x="767" y="348" width="124" height="4" rx="2" fill="#2da47e"/>
    <circle cx="829" cy="392" r="18" fill="rgba(45,164,126,0.15)"/>
    <!-- icon: cloud -->
    <path d="M820,395 C817,395 815,393 815,390 C815,387 818,385 820,385 C821,381 824,378 828,378 C832,378 836,381 837,385 C840,385 842,387 842,390 C842,393 840,395 837,395 Z" fill="none" stroke="#2da47e" stroke-width="1.6"/>
    <text x="829" y="440" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="600" fill="#F5EFE0">Save PDF</text>
  </g>

  <!-- N5: Email Parent (slate-blue) — cx=576, cy=410 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="2.5s" fill="freeze"/>
    <rect x="514" y="348" width="124" height="124" rx="12" fill="none" filter="url(#shadow)"/>
    <rect x="514" y="348" width="124" height="124" rx="12" fill="#252542" stroke="rgba(74,144,217,0.55)" stroke-width="1.5"/>
    <rect x="514" y="348" width="124" height="4" rx="2" fill="#4a90d9"/>
    <circle cx="576" cy="392" r="18" fill="rgba(74,144,217,0.15)"/>
    <!-- icon: envelope -->
    <rect x="567" y="385" width="18" height="13" rx="1.5" fill="none" stroke="#4a90d9" stroke-width="1.6"/>
    <path d="M567,387 L576,393 L585,387" stroke="#4a90d9" stroke-width="1.6" fill="none"/>
    <text x="576" y="440" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="600" fill="#F5EFE0">Email Parent</text>
  </g>

  <!-- N6: Notify Layth (green, TERMINAL) — cx=323, cy=410 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="3s" fill="freeze"/>
    <rect x="261" y="348" width="124" height="124" rx="12" fill="none" filter="url(#shadow)"/>
    <rect x="261" y="348" width="124" height="124" rx="12" fill="#252542" stroke="rgba(0,230,118,0.55)" stroke-width="1.5"/>
    <rect x="261" y="348" width="124" height="4" rx="2" fill="#00E676"/>
    <circle cx="323" cy="392" r="18" fill="rgba(0,230,118,0.15)"/>
    <!-- icon: bell -->
    <path d="M317,390 C317,386 320,384 323,384 C326,384 329,386 329,390 L329,394 L331,397 L315,397 L317,394 Z" fill="none" stroke="#00E676" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M321,399 C321,401 322,402 323,402 C324,402 325,401 325,399" fill="none" stroke="#00E676" stroke-width="1.6"/>
    <text x="323" y="440" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="600" fill="#F5EFE0">Notify Layth</text>
    <!-- Terminal pulse rings -->
    <circle cx="323" cy="392" fill="none" stroke="#00E676" stroke-width="1.4">
      <animate attributeName="r" values="18;56" dur="1.4s" begin="5.7s" repeatCount="indefinite" calcMode="ease-out"/>
      <animate attributeName="stroke-opacity" values="0.7;0" dur="1.4s" begin="5.7s" repeatCount="indefinite" calcMode="ease-out"/>
    </circle>
    <circle cx="323" cy="392" fill="none" stroke="#00E676" stroke-width="1">
      <animate attributeName="r" values="18;56" dur="1.4s" begin="6.2s" repeatCount="indefinite" calcMode="ease-out"/>
      <animate attributeName="stroke-opacity" values="0.4;0" dur="1.4s" begin="6.2s" repeatCount="indefinite" calcMode="ease-out"/>
    </circle>
  </g>

  <!-- ────────────────────────────────────────────────────────────────────
       STATUS BAR
       ──────────────────────────────────────────────────────────────────── -->
  <g class="status-g">
    <rect x="80" y="512" width="740" height="48" rx="8" fill="rgba(37,37,66,0.7)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

    <!-- Active -->
    <circle cx="106" cy="536" r="5" fill="#00E676" class="pulse-dot"/>
    <text x="118" y="540" font-family="'DM Sans',sans-serif" font-size="10" font-weight="600" fill="rgba(245,239,224,0.85)" letter-spacing="1.2">WORKFLOW ACTIVE</text>

    <!-- Divider -->
    <line x1="245" y1="525" x2="245" y2="547" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Avg execution -->
    <text x="262" y="531" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(245,239,224,0.4)" letter-spacing="1.5">AVG EXECUTION</text>
    <text x="262" y="546" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600" fill="#F5EFE0">8.2s</text>

    <!-- Divider -->
    <line x1="430" y1="525" x2="430" y2="547" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Reports today -->
    <text x="448" y="531" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(245,239,224,0.4)" letter-spacing="1.5">REPORTS TODAY</text>
    <text x="448" y="546" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600" fill="#F5EFE0">14</text>

    <!-- Divider -->
    <line x1="620" y1="525" x2="620" y2="547" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Success rate -->
    <text x="638" y="531" font-family="'DM Sans',sans-serif" font-size="9" fill="rgba(245,239,224,0.4)" letter-spacing="1.5">SUCCESS RATE</text>
    <text x="638" y="546" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600" fill="#F5EFE0">99.2%</text>
  </g>

  <!-- n8n badge -->
  <g>
    <rect x="740" y="560" width="130" height="28" rx="6" fill="rgba(37,37,66,0.8)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <circle cx="756" cy="574" r="5" fill="#EA6A47"/>
    <text x="766" y="578" font-family="'DM Sans',sans-serif" font-size="9.5" font-weight="600" fill="rgba(245,239,224,0.5)">Built with n8n</text>
  </g>

</svg>
</body>
</html>
